<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refleksi Rasa Syukur</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        video {
            width: 80%; /* Video diperkecil */
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        #text-container {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 20px;
            text-align: center;
            min-height: 150px;
            padding: 0 10px;
        }
        .highlight {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <video controls>
        <source src="152534.mp4" type="video/mp4">
        Browser Anda tidak mendukung elemen video.
    </video>
    
    <h2>Sebuah Renungan</h2>
    <div id="text-container"></div>
</div>

<script>
    const text = `Melihat pemandangan ini, kita diingatkan betapa rapuhnya kehidupan dan betapa berharganya keamanan yang sering kita anggap remeh. Bersyukur bukan hanya saat kita mendapatkan apa yang kita inginkan, tetapi tentang menghargai napas, perlindungan, dan kedamaian yang kita miliki saat ini. Rasa syukur adalah kekayaan sejati, pengingat bahwa di tengah ketidakpastian dunia, kita masih memiliki alasan untuk berharap dan mencintai.`;
    
    const container = document.getElementById('text-container');
    let index = 0;

    function typeWriter() {
        if (index < text.length) {
            container.innerHTML += text.charAt(index);
            index++;
            setTimeout(typeWriter, 50); // Kecepatan mengetik
        }
    }

    // Mulai mengetik saat halaman dimuat
    window.onload = typeWriter;
</script>

</body>
</html>
